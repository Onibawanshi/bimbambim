<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      .wrapper {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      .content {
        flex: 1;
      }
      .contact-card {
        background: #f8f9fa;
        border-radius: 20px;
        padding: 1.5rem;
        transition: 0.3s;
        text-align: center;
        height: 100%;
      }
      .contact-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
      .contact-icon {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      .black-footer {
        background-color: #0a0a0a;
        color: #888;
        text-align: center;
        padding: 20px 0;
        font-size: 14px;
        border-top: 1px solid #222;
      }
      .black-footer a {
        color: #aaa;
        text-decoration: none;
        margin: 0 10px;
      }
      .black-footer a:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="content">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
          <div class="container">
            <a class="navbar-brand p-0" href="index.html"
              ><img src="oni (1).png" alt="Logo" width="40"
            /></a>
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="Games.html">Favorite games</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link active" href="Contacts.html">Contacts</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
        <div class="container my-5">
          <h1 class="text-center mb-5">Мои контакты</h1>
          <div class="row g-4">
            <div class="col-md-4">
              <div class="contact-card">
                <div class="contact-icon"></div>
                <h4>Telegram</h4>
                <p>@onibawanshi</p>
                <a
                  href="https://t.me/onibawanshi"
                  target="_blank"
                  class="btn btn-primary"
                  >Написать</a
                >
              </div>
            </div>
            <div class="col-md-4">
              <div class="contact-card">
                <div class="contact-icon"></div>
                <h4>Steam</h4>
                <p>Onibawanshi</p>
                <a
                  href="https://steamcommunity.com/profiles/76561199416041994/"
                  target="_blank"
                  class="btn btn-secondary"
                  >Посмотреть</a
                >
              </div>
            </div>
            <div class="col-md-4">
              <div class="contact-card">
                <div class="contact-icon"></div>
                <h4>GitHub</h4>
                <p>Onibawanshi</p>
                <a
                  href="https://github.com/Onibawanshi"
                  target="_blank"
                  class="btn btn-dark"
                  >Профиль</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
      <footer class="black-footer">
        <div class="container">
          <div>
            <a href="index.html">Home</a> | <a href="Games.html">Games</a> |
            <a href="Contacts.html">Contacts</a>
          </div>
          <div>#2026</div>
        </div>
      </footer>
    </div>
  </body>
</html>
