<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      .wrapper {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      .content {
        flex: 1;
      }
      .card {
        border-radius: 1em;
        text-align: center;
        padding: 1em;
        transition: 0.3s;
      }
      .card:hover {
        background-color: rgba(0, 0, 0, 0.05);
        transform: scale(1.02);
      }
      .card img {
        border-radius: 20%;
        width: 60%;
        margin: auto;
      }
      .black-footer {
        background-color: #0a0a0a;
        color: #888;
        text-align: center;
        padding: 20px 0;
        font-size: 14px;
        border-top: 1px solid #222;
      }
      .black-footer a {
        color: #aaa;
        text-decoration: none;
        margin: 0 10px;
      }
      .black-footer a:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="content">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
          <div class="container">
            <a class="navbar-brand p-0" href="index.html"
              ><img src="oni (1).png" alt="Logo" width="40"
            /></a>
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link active" href="Games.html"
                    >Favorite games</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="Contacts.html">Contacts</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
        <div class="container my-5">
          <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-5">
            <div class="col">
              <div class="card">
                <img src="e15d0225ebd3dc29a1b2f83c74eeba33.jpg" />
                <div class="card-body">
                  <h5>Hotline Miami 2</h5>
                  <a
                    href="https://store.steampowered.com/app/274170/"
                    target="_blank"
                    class="btn btn-primary"
                    >Steam</a
                  >
                </div>
              </div>
            </div>
            <div class="col">
              <div class="card">
                <img
                  src="gpA3zsovAsItdILTifsx9EzgtnlgqhFOUrjdExKI_kvxCPjyglbts94Z__5aErtWKEmqocuylbkE4JmI38b0-1mX.jpg"
                />
                <div class="card-body">
                  <h5>Dota 2</h5>
                  <a
                    href="https://store.steampowered.com/app/570/"
                    target="_blank"
                    class="btn btn-primary"
                    >Steam</a
                  >
                </div>
              </div>
            </div>
            <div class="col">
              <div class="card">
                <img src="ba3e1dab671a8b97ece17600b7d2c46f.jpg" />
                <div class="card-body">
                  <h5>Valorant</h5>
                  <a
                    href="https://store.epicgames.com/ru/p/valorant"
                    target="_blank"
                    class="btn btn-primary"
                    >Epic Games</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <footer class="black-footer">
        <div class="container">
          <div>
            <a href="index.html">Home</a> | <a href="Games.html">Games</a> |
            <a href="Contacts.html">Contacts</a>
          </div>
          <div>#2026</div>
        </div>
      </footer>
    </div>
  </body>
</html>
